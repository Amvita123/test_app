services:
  web:
    build: .
    container_name: test_app_web
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    restart: always

  celery:
    build: .
    container_name: test_app_celery
    command: celery -A core worker -l info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    restart: always

  celery-beat:
    build: .
    container_name: test_app_celery_beat
    command: celery -A core beat -l info
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    restart: always

  redis:
    image: redis:7
    container_name: test_app_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always

volumes:
  redis_data: